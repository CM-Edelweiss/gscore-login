<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>GSCORE 登录器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" />
    <style>
      :root {
        --text:      rgba(255, 255, 255, 0.96);
        --text-dim:  rgba(255, 255, 255, 0.70);
        --text-mute: rgba(255, 255, 255, 0.42);
        --glass-top: rgba(255, 255, 255, 0.16);
        --glass-bot: rgba(255, 255, 255, 0.06);
        --edge:      rgba(255, 255, 255, 0.18);
        --specular:  rgba(255, 255, 255, 0.35);
        --good:      #86e5a2;
        --display: 'Fraunces', 'Cormorant Garamond', serif;
        --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text',
                'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: var(--sans);
        color: var(--text);
        background: #000;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      .stage { position: fixed; inset: 0; z-index: -1; background: #000; }
      .stage img { width: 100%; height: 100%; object-fit: cover; filter: saturate(1.05) brightness(0.68); }
      .stage video {
        width: 100%; height: 100%;
        object-fit: cover;
        filter: saturate(1.05) brightness(0.68);
      }
      main {
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 40px 20px;
      }
      .card {
        width: min(380px, 100%);
        padding: 40px 28px 30px;
        text-align: center;
        background: linear-gradient(180deg, var(--glass-top) 0%, var(--glass-bot) 100%);
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        border: 1px solid var(--edge);
        border-radius: 24px;
        box-shadow:
          0 16px 48px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 var(--specular);
      }
      .check {
        width: 72px; height: 72px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background: rgba(134, 229, 162, 0.18);
        border: 1px solid rgba(134, 229, 162, 0.45);
        display: flex; align-items: center; justify-content: center;
        color: var(--good);
        font-size: 38px;
        box-shadow: inset 0 1px 0 var(--specular);
      }
      h1 {
        margin: 0 0 8px;
        font-family: var(--display);
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      p.sub {
        margin: 0 0 24px;
        color: var(--text-dim);
        font-size: 14px;
        line-height: 1.6;
      }
      .hint {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        color: var(--text-mute);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <img src="https://upload-bbs.miyoushe.com/upload/2026/06/23/283600944/f1db6e4906bd09ff19f6ba1cf934f1bd_4853071914412221533.png" alt="" />
    </div>
    <main>
      <section class="card">
        <div class="check">R</div>
        <h1>GSCORE 登录器</h1>
        <p class="sub">提供<a href="https://github.com/tyql688/NTEUID" target="_blank">NTEUID</a>、<a href="https://github.com/tyql688/DNAUID" target="_blank">DNAUID</a>、<a href="https://github.com/Loping151/XutheringWavesUID" target="_blank">XutheringWavesUID</a>的登录服务。</p>
        <p class="sub">当前启用登录服务：{{ login_list }}</p>
        <p class="hint">本登录器HMAC签名校验为 <b>{{ shared_secret }}</b></p>
      </section>
    </main>
  </body>
</html>
